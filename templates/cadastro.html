<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de equipamentos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cadastro.css') }}">
</head>
<body>

        <!-- Conteúdo principal -->
        <main class="main-content">
            <h2 class="card-titulo">Cadastre aqui um equipamento!</h2>
                <div class="card-cadastro">

            {% set equipamento = equipamento|default(None) %}
                
        <form class="form cadastro" action="{% if equipamento %} {{ url_for('auth.atualizar', id=equipamento.id) }} {% else %} {{ url_for('auth.salvar_equipamento') }} {% endif %}" method="POST">

                    <!-- Produto -->
                    <div class="campo">
                        <label for="descriçao" class="label">Descriçao:</label>
                        <input type="text" id="descricao" name="descricao" class="input" value="{{ equipamento.descricao if equipamento else '' }}" placeholder="Digite aqui...">
                    </div>

                    <!-- Marca -->
                    <div class="campo">
                        <label for="marca" class="label">Marca:</label>
                        <input type="text" id="marca" name="marca" class="input" value="{{ equipamento.marca if equipamento else '' }}" placeholder="Digite aqui...">
                    </div>

                    <!-- Modelo -->
                    <div class="campo">
                        <label for="modelo" class="label">Modelo:</label>
                        <input type="text" id="modelo" name="modelo" class="input" value="{{ equipamento.modelo if equipamento else '' }}" placeholder="Digite aqui...">
                    </div>

                    <!-- Tipo -->
                    <div class="campo">
                        <label for="tipo" class="label">Tipo:</label>
                        <input type="text" id="tipo" name="tipo" class="input" value="{{ equipamento.tipo if equipamento else '' }}" placeholder="Digite aqui...">
                    </div>

                    <!-- Cor -->
                    <div class="campo">
                        <label for="cor" class="label">Cor:</label>
                        <input type="text" id="cor" name="cor" class="input" value="{{ equipamento.cor if equipamento else '' }}" placeholder="Digite aqui...">
                    </div>

                    <!-- Lançamento -->
                    <div class="campo">
                        <label for="lancamento" class="label">Lançamento:</label>
                        <input type="text" id="lancamento" name="lancamento" class="input" value="{{ equipamento.lancamento if equipamento else '' }}" placeholder="Digite aqui...">
                    </div>

                    <!-- Código -->
                    <div class="campo">
                        <label for="codigo" class="label">Código:</label>
                        <input type="text" id="codigo" name="codigo" class="input" value="{{ equipamento.codigo if equipamento else '' }}" placeholder="Digite aqui...">
                    </div>

                    <!-- Empresa -->
                    <div class="campo">
                        <label for="empresa" class="label">Status:</label>
                        <input type="text" id="status" name="status" class="input" value="{{ equipamento.status if equipamento else '' }}" placeholder="Digite aqui...">
                    </div>

                    <!-- Botões -->
                    <div class="grupo-botoes">
                        <button type="submit" class="btn btn-salvar">Salvar</button>
                        <button type="button" class="btn btn-cancelar">Cancelar</button>
                    </div>
                </form>
            </div>
        </main>

        <!-- Rodapé simples -->
        <footer class="footer">
            <p>InventaTI © 2026 - Melhores equipamentos de TI você encontra aqui.</p>
        </footer>
    </div>
</body>
</html>
